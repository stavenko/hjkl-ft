name = "auth-worker"
main = "build/worker/shim.mjs"
compatibility_date = "2024-01-01"

[build]
command = "cargo install -q worker-build && worker-build --release"

[[durable_objects.bindings]]
name = "USER_DO"
class_name = "UserDO"

[[durable_objects.bindings]]
name = "AUTH_DO"
class_name = "AuthDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["AuthDO"]

