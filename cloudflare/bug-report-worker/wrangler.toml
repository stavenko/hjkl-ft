name = "bug-report-worker"
main = "build/worker/shim.mjs"
compatibility_date = "2024-12-01"

[build]
# Pin worker-build to match the `worker`/`wasm-bindgen` versions — an unpinned
# `cargo install worker-build` pulls a newer build that passes wasm-bindgen flags
# the locked CLI doesn't support.
command = "cargo install -q worker-build --version 0.8.5 && worker-build --release"

[[durable_objects.bindings]]
name = "BUG_REPORT_DO"
class_name = "BugReportDO"

# Fresh DO: the worker is deleted + recreated to wipe old (KV-API) data, so a
# single v1 SQLite migration applies cleanly to the brand-new namespace.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["BugReportDO"]

[vars]
JWT_SECRET = "dev-secret-change-in-production"
# Admin key for the read endpoint (GET /reports). Dev placeholder — harden later.
ADMIN_KEY = "dev-admin-key-change-in-production"

# ── Production (separate worker on bug.renorma.app, clean DO data) ──
# Deploy: wrangler deploy --env production
# Secrets: wrangler secret put JWT_SECRET --env production
#          wrangler secret put ADMIN_KEY  --env production
# Prod inherits the base [[migrations]] above (no separate prod migrations).
[env.production]
name = "bug-report-worker-prod"
workers_dev = false

[[env.production.routes]]
pattern = "bug.renorma.app"
custom_domain = true

[[env.production.durable_objects.bindings]]
name = "BUG_REPORT_DO"
class_name = "BugReportDO"

# JWT_SECRET is mounted from the global Secrets Store in prod (dev keeps the
# [vars] value above). The binding name MUST equal the env name the code reads.
[[env.production.secrets_store_secrets]]
binding = "JWT_SECRET"
store_id = "e2b7d6c72d1f44ea889bd02a27d215f7"
secret_name = "jwt-secret"
