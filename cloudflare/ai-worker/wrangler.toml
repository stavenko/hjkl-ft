name = "ai-worker-dev"
main = "build/worker/shim.mjs"
compatibility_date = "2024-12-01"

[build]
command = "cargo install -q worker-build --version 0.8.5 && worker-build --release"

[ai]
binding = "AI"

# Service binding to payment-worker (the OWNER of the subscription): the AI gate
# asks it `GET /subscription` over this binding, forwarding the caller's bearer
# token. payment-worker resolves its own SubscriptionDO by its private epoch, so
# this worker holds no knowledge of the DO's name/epoch — that coupling drifted
# once (reader stuck on an old epoch) and caused spurious 402 paywalls.
[[services]]
binding = "PAYMENT"
service = "payment-worker-dev"

[vars]
JWT_SECRET = "dev-secret-change-in-production"

# ── Production (separate worker on ai.renorma.app) ──
# Deploy: wrangler deploy --env production
# Secrets: wrangler secret put JWT_SECRET --env production
[env.production]
name = "ai-worker-prod"
workers_dev = false

[[env.production.routes]]
pattern = "ai.renorma.app"
custom_domain = true

[env.production.ai]
binding = "AI"

# Service binding to the prod owner (payment-worker-prod).
[[env.production.services]]
binding = "PAYMENT"
service = "payment-worker-prod"

# JWT_SECRET is mounted from the global Secrets Store in prod (dev keeps the
# [vars] value above). The binding name MUST equal the env name the code reads.
[[env.production.secrets_store_secrets]]
binding = "JWT_SECRET"
store_id = "e2b7d6c72d1f44ea889bd02a27d215f7"
secret_name = "jwt-secret"
