[serve]
port = 3601

[watch]
ignore = ["dist", "node_modules", "styles/output.css"]

[[hooks]]
stage = "pre_build"
command = "bash"
command_arguments = ["-c", "cat styles/bulma.min.css styles/input.css > styles/output.css"]

[[hooks]]
stage = "post_build"
command = "bash"
command_arguments = ["scripts/extract-inline-module.sh"]

[[proxy]]
rewrite = "/api/"
backend = "http://127.0.0.1:3600/api/"

[[proxy]]
rewrite = "/config/"
backend = "http://127.0.0.1:3600/config/"
