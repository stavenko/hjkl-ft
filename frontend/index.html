<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FT" />
    <meta name="theme-color" content="#ffffff" />
    <title>Food Tracker</title>
    <link rel="manifest" href="manifest.json" />
    <link data-trunk rel="css" href="styles/output.css" />
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <link data-trunk rel="copy-file" href="sw.js" />
    <link data-trunk rel="copy-file" href="manifest.json" />
    <link data-trunk rel="copy-dir" href="fonts" />
    <link data-trunk rel="copy-file" href="icon-192.png" />
    <link data-trunk rel="copy-file" href="icon-512.png" />
    <link data-trunk rel="copy-dir" href="config" />
    <link data-trunk rel="copy-file" href="_redirects" />
    <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(function(reg) {
        reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'activated') {
                    window.location.reload();
                }
            });
        });
    });
}
</script>
</body>
</html>
