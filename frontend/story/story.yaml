# ─────────────────────────────────────────────────────────────────────────────
# Story DSL — the whole onboarding story as data.
#
# Authored in YAML; build.rs converts it to JSON in OUT_DIR, the crate embeds the
# JSON and parses it with serde_json (no YAML in the wasm bundle).
#
# Condition grammar (`Cond`):
#   always
#   {event: <name>}                 a task closes when this event fires while enabled
#   {sensor: <name>}                boolean sensor is true
#   {sensor: <name>, gte: <n>}      numeric sensor >= n   (counter-based close)
#   {streak: <source>}              consecutive-day streak over <source> >= 1
#   {streak: <source>, gte: <n>}    consecutive-day streak over <source> >= n
#   {streak: <source>, gte: <n>, since_open: <section-id>}
#                                   fresh consecutive streak counting only days
#                                   strictly AFTER that section's open date
#   {count:  <source>, gte: <n>, since_open: <section-id>}
#                                   NON-consecutive distinct-day count strictly
#                                   AFTER that section's open date
#   {section_opened: <section-id>}  the user has opened that section's page
#   {task: <task-id>}               that task is closed
#   {all: [<cond>, ...]} / {any: [<cond>, ...]}
#
# `sensors`/`sources`/`events` below are documentation of the closed Rust
# vocabularies the engine implements (sensors read from Progress/gather(); sources
# are day-source closures reduced in-engine by streak/count; events are emitted
# from feature code via story::emit). Actions (`on_open`) and `widget`s are
# likewise a closed Rust registry referenced by name.
# ─────────────────────────────────────────────────────────────────────────────

sensors: [calorie_planka_set, sub_active, sub_paid,
          snack_yesterday, no_high_cal_drink_yesterday]
sources: [diary, weight, weighin_q5, steps, steps_planka, veg, protein, no_liquid_cal, evening_protein]
events:  [weight_saved, steps_saved, food_logged, recipe_finalized, recipe_in_diary,
          waste_entered, restaurant_logged, photos_done, sex_selected, birth_year_set, height_set,
          weigh_in_reminder_on, steps_reminder_on, lang_configured, notif_received,
          food_repeated]

# ── Tasks (the single pool; "active" = enabled & not closed) ─────────────────
tasks:
  - id: photos
    title: {en: "Take your progress photos", ru: "Сделайте фото прогресса"}
    close: {event: photos_done}
  - id: sex
    title: {en: "Pick your sex in settings", ru: "Укажите пол в настройках"}
    close: {event: sex_selected}
  - id: age
    title: {en: "Set your birth year", ru: "Укажите год рождения"}
    close: {event: birth_year_set}
  - id: height
    title: {en: "Set your height", ru: "Укажите рост"}
    close: {event: height_set}
  - id: lang
    title: {en: "Confirm the app language", ru: "Подтвердите язык приложения"}
    close: {event: lang_configured}
  - id: notif
    title: {en: "Receive the test notification", ru: "Получите тестовое уведомление"}
    close: {event: notif_received}
  - id: weigh_in
    title: {en: "Enable the weigh-in reminder", ru: "Включите напоминание о взвешивании"}
    close: {event: weigh_in_reminder_on}
  - id: first_weigh
    title: {en: "Record your first weight", ru: "Запишите первый вес"}
    close: {event: weight_saved}
  - id: weight_streak
    title: {en: "Weigh in 7 days in a row", ru: "Взвешивайтесь 7 дней подряд"}
    short: {en: "Weight diary: {x}/{n} days", ru: "Дневник веса: {x}/{n} дней"}
    close: {streak: weight, gte: 7}
  - id: first_food
    title: {en: "Log your first food", ru: "Внесите первую еду"}
    enable: {section_opened: first-food}   # armed when the section is opened
    close:  {event: food_logged}            # fired only while enabled
  - id: diary_streak
    title: {en: "Keep the food diary 7 days in a row", ru: "Ведите дневник еды 7 дней подряд"}
    short: {en: "Food diary: {x}/{n} days", ru: "Дневник питания: {x}/{n} дней"}
    close: {streak: diary, gte: 7}
  - id: repeat_food
    title: {en: "Repeat yesterday's food", ru: "Повторите вчерашнюю еду"}
    close:  {event: food_repeated}          # fired by "Repeat today" in the diary
  - id: steps_reminder
    title: {en: "Enable the steps reminder", ru: "Включите напоминание о шагах"}
    close: {event: steps_reminder_on}
  - id: first_steps
    title: {en: "Record your first steps", ru: "Запишите первые шаги"}
    close: {event: steps_saved}
  - id: steps_streak
    title: {en: "Log steps 7 days in a row", ru: "Записывайте шаги 7 дней подряд"}
    short: {en: "Steps diary: {x}/{n} days", ru: "Дневник шагов: {x}/{n} дней"}
    close: {streak: steps, gte: 7}
  - id: dish_created
    title: {en: "Create a cooked dish", ru: "Создайте готовое блюдо"}
    close: {event: recipe_finalized}
  - id: dish_in_diary
    title: {en: "Add the dish to the diary", ru: "Добавьте блюдо в дневник"}
    close: {event: recipe_in_diary}
  - id: bones
    title: {en: "Log food with inedible waste", ru: "Внесите еду с несъедобной частью"}
    close: {event: waste_entered}
  - id: restaurant
    title: {en: "Log a restaurant meal", ru: "Внесите еду из ресторана"}
    close: {event: restaurant_logged}
  - id: diary_continue
    title: {en: "Keep the food diary 7 more days in a row", ru: "Ведите дневник еды ещё 7 дней подряд"}
    short: {en: "Food diary: {x}/{n} days", ru: "Дневник питания: {x}/{n} дней"}
    # Counts only days AFTER ch2-mistake is opened (baseline = that section's seen
    # flag) — so it's a fresh 7 days, not the streak that already unlocked chapter 2.
    close: {streak: diary, gte: 7, since_open: ch2-mistake}
  - id: veg_streak
    # {n} is replaced with the sex-specific target (600 g men / 400 g women) at render.
    title: {en: "Eat and log {n} g of vegetables or more every day", ru: "Каждый день съедайте и записывайте {n} г овощей или больше"}
    close: {streak: veg, gte: 7, since_open: ch2-veg}
  - id: protein_streak
    # {n} is replaced with the calculated target (1.2 g/kg of latest weight) at render.
    title: {en: "Eat and log {n} g of protein or more every day", ru: "Каждый день съедайте и записывайте {n} г белка или больше"}
    close: {streak: protein, gte: 7, since_open: ch2-protein}
  - id: snack
    title: {en: "Log a low-calorie snack", ru: "Внесите низкокалорийную закусь"}
    close: {sensor: snack_yesterday}
  - id: drinks
    # A WEEK with no liquid calories, counted fresh from when ch2-drinks opens
    # (armed via on_open) — so it reads 0/7 on opening, not pre-satisfied.
    title: {en: "A week with no liquid calories. Don't log calorie drinks — and, most importantly, don't drink them.", ru: "Неделю без жидких калорий. Не записываем калорийные напитки, и самое главное не употребляем."}
    close: {streak: no_liquid_cal, gte: 7, since_open: ch2-drinks}
  - id: night
    # Two dinners (not necessarily in a row) with ≥1/3 of the daily protein norm,
    # assessed retrospectively per completed day, counted from when ch2-night opens.
    title: {en: "Log a dinner with a third or more of your daily protein norm — twice.", ru: "Два раза записываем на ужин треть или более дневной нормы белка."}
    close: {count: evening_protein, gte: 2, since_open: ch2-night}
  - id: steps_planka
    # A week of hitting the daily steps planka (7000), counted fresh from when the
    # ch3 "Почему не уходит вес" section opens.
    title: {en: "Hit the steps planka every day for a week: 7000 steps", ru: "Неделю выполняйте планку по шагам: 7000 шагов в день"}
    close: {streak: steps_planka, gte: 7, since_open: ch3-no-loss}
  - id: weighin_q5
    # A week of top-quality (5/5) weigh-ins, counted fresh from when ch3-calorie opens.
    title: {en: "Weigh in at 5/5 quality 7 days in a row", ru: "Взвешивайтесь с качеством 5/5 — 7 дней подряд"}
    close: {streak: weighin_q5, gte: 7, since_open: ch3-calorie}

# ── Chapters ─────────────────────────────────────────────────────────────────
chapters:
  - id: ch1
    title: {en: "Nice to meet you", ru: "Приятно познакомиться"}
    open: always
    sections:
      - id: intro
        icon: "➡️"
        title: {en: "Introduction", ru: "Введение"}
        tasks: [photos]
        blocks:
          - {text_key: story.intro.p1}
          - {text_key: story.intro.p2}
          - {text_key: story.intro.p3}
          - {text_key: story.intro.p4}
          - {text_key: story.intro.p5}
          - {text_key: story.intro.p6}
          - {text_key: story.intro.p7}
          - {text_key: story.intro.p8}
          - {text_key: story.intro.p9}
          - {text_key: story.intro.p10}
          - {text_key: story.intro.p11}
          - {text_key: story.intro.p12}
          - {widget: {id: progress_photos}}
      - id: setup
        icon: "⚙️"
        title: {en: "Let's set up the app", ru: "Для начала настроим приложение"}
        tasks: [sex, age, height, lang, notif]
        # Every listed task gates completion (no override → all must be done).
        blocks:
          - {text_key: story.setup.intro}
          - {bullets: [story.setup.s_story, story.setup.s_diary, story.setup.s_recipes, story.setup.s_settings]}
          - {text_key: story.setup.task_intro}
          - {bullets: [story.setup.check_lang_line, story.setup.check_notif_line, story.setup.check_sex_line, story.setup.check_age_line, story.setup.check_height_line]}
          - {text_key: story.setup.why_math}
          - {text_key: story.setup.enable_push}
          - {text_key: story.setup.instructions}
          - {widget: {id: setup_controls}}
          - {widget: {id: cta, route: /settings, label: story.setup.open_settings}}
      - id: accounting
        icon: "💰"
        title: {en: "The accounting of weight loss", ru: "Бухгалтерия похудения"}
        tasks: [weigh_in, first_weigh, weight_streak]
        # Gate the next section ("My first food entries") on BOTH enabling the
        # weigh-in reminder AND recording an actual weight.
        complete: {all: [{task: weigh_in}, {task: first_weigh}]}
        blocks:
          - {text_key: story.acc.p1}
          - {text_key: story.acc.p2}
          - {text_key: story.acc.p3}
          - {text_key: story.acc.p4}
          - {text_key: story.acc.p5}
          - {bullets: [story.acc.li_weight, story.acc.li_calories]}
          - {text_key: story.acc.p6}
          - {text_key: story.acc.p7}
          - {heading: story.acc.howto_title}
          - {text_key: story.acc.howto}
          - {tasks: true}
          - {widget: {id: cta, route: /settings, label: story.setup.open_settings}}
      - id: first-food
        icon: "🍽️"
        title: {en: "My first food entries", ru: "Мои первые записи еды"}
        tasks: [first_food, diary_streak]
        # The 7-day diary streak is shown as a task but does NOT gate the next
        # section (same pattern as `accounting`'s weight_streak) — only the first
        # logged food advances the story.
        complete: {task: first_food}
        on_open: [arm_first_food]
        blocks:
          - {text_key: story.ff.p1}
          - {text_key: story.ff.p2}
          - {text_key: story.ff.p3}
          - {text_key: story.ff.ways_intro}
          - {bullets: [story.ff.way1, story.ff.way2, story.ff.way3]}
          - {text_key: story.ff.howto_open}
          - {widget: {id: fab}}
          - {list: [story.ff.step_new, story.ff.step_name, story.ff.step_add, story.ff.step_more]}
          - {tasks: true}
          - {widget: {id: cta, route: /diary, label: story.ff.open_diary}}
      - id: activity
        icon: "🚶"
        title: {en: "Activity and weight", ru: "Активность и вес"}
        tasks: [steps_reminder, first_steps, steps_streak]
        complete: {all: [{task: steps_reminder}, {task: first_steps}]}
        blocks:
          - {text_key: story.act.p1}
          - {text_key: story.act.p2}
          - {text_key: story.act.p3}
          - {text_key: story.act.p4}
          - {text_key: story.act.p5}
          - {text_key: story.act.p6}
          - {text_key: story.act.p7}
          - {text_key: story.act.p8}
          - {heading: story.act.howto_title}
          - {text_key: story.act.howto}
          - {tasks: true}
          - {widget: {id: cta, route: /steps, label: story.act.record_steps}}
      - id: cooking
        icon: "👨‍🍳"
        title: {en: "I'm cooking", ru: "Я готовлю"}
        tasks: [dish_created, dish_in_diary]
        blocks:
          - {text_key: story.cook.p1}
          - {text_key: story.cook.p2}
          - {text_key: story.cook.p3}
          - {list: [story.cook.step1, story.cook.step2]}
          - {tasks: true}
          - {widget: {id: cta, route: /recipes, label: story.cook.open_recipes}}
      - id: bones
        icon: "🦴"
        title: {en: "My food with bones", ru: "Моя еда с костями"}
        tasks: [bones]
        blocks:
          - {text_key: story.bones.p1}
          - {text_key: story.bones.p2}
          - {text_key: story.bones.p3}
          - {text_key: story.bones.p4}
          - {tasks: true}
          - {widget: {id: cta, route: /diary, label: story.bones.open_diary}}
      - id: restaurant
        icon: "🎉"
        title: {en: "A party or a restaurant", ru: "Праздник или ресторан"}
        tasks: [restaurant]
        blocks:
          - {text_key: story.rest.p1}
          - {text_key: story.rest.p2}
          - {list: [story.rest.method1, story.rest.method2]}
          - {text_key: story.rest.p3}
          - {text_key: story.rest.p4}
          - {text_key: story.rest.p5}
          - {text_key: story.rest.p6}
          - {text_key: story.rest.p7}
          - {tasks: true}
          - {widget: {id: cta, route: /diary, label: story.rest.open_diary}}
      - id: diary
        icon: "📔"
        title: {en: "Why keep a diary?", ru: "Зачем вести дневник?"}
        tasks: [repeat_food]
        blocks:
          - {text_key: story.diary.p1}
          - {text_key: story.diary.p2}
          - {text_key: story.diary.p3}
          - {text_key: story.diary.p4}
          - {list: [story.diary.item1, story.diary.item2, story.diary.item3, story.diary.item4, story.diary.item5]}
          - {text_key: story.diary.p5}
          - {text_key: story.diary.p6}
          # "Make tracking easier" — now a sub-heading of this section, not its own.
          - {heading: story.easier.heading}
          - {list: [story.easier.t1, story.easier.t2, story.easier.t3, story.easier.t4]}
          - {text_key: story.diary.repeat_howto}
          - {tasks: true}
          - {widget: {id: cta, route: /diary, label: story.diary.open_diary}}

  - id: ch2
    title: {en: "Appetite", ru: "Аппетит"}
    open: {all: [{streak: weight, gte: 7}, {streak: steps, gte: 7}, {streak: diary, gte: 7}, {sensor: sub_active}]}
    sections:
      - id: ch2-mistake
        icon: "⚠️"
        title: {en: "The biggest mistake of dieters", ru: "Основная ошибка худеющих"}
        tasks: [diary_continue]
        complete: always   # task shown but does NOT gate — next section opens on open
        blocks:
          - {text_key: story.ch2.mistake.p1}
          - {text_key: story.ch2.mistake.p1b}
          - {text_key: story.ch2.mistake.p2}
          - {text_key: story.ch2.mistake.p3}
          - {text_key: story.ch2.mistake.p4}
          - {text_key: story.ch2.mistake.p5}
          - {tasks: true}
      - id: ch2-veg
        icon: "🥦"
        title: {en: "Vegetables and fruit", ru: "Фрукты и овощи"}
        tasks: [veg_streak]
        complete: always   # the week-long veg habit is shown but does NOT gate progress
        on_open: [set_veg_goal]   # opening sets the veg/fruit planka (joins the goals list)
        blocks:
          - {text_key: story.ch2.veg.p1}
          - {text_key: story.ch2.veg.p2}
          - {tasks: true}
      - id: ch2-protein
        icon: "🍗"
        title: {en: "Protein — your best helper", ru: "Белок — лучший помощник"}
        tasks: [protein_streak]
        complete: always   # week-long protein habit is shown but does NOT gate progress
        on_open: [set_protein_goal]   # also sets the hidden Protein goal for the diary header
        blocks:
          - {text_key: story.ch2.protein.p1}
          - {text_key: story.ch2.protein.p2}
          - {tasks: true}
      - id: ch2-snack
        icon: "🍿"
        title: {en: "Eating out of boredom", ru: "Еда от скуки"}
        # No task here — informational section (completes on open, non-gating).
        blocks:
          - {text_key: story.ch2.snack.p1}
          - {text_key: story.ch2.snack.p2}
          - {text_key: story.ch2.snack.p3}
          - {text_key: story.ch2.snack.p4}
          - {list: [story.ch2.snack.h1, story.ch2.snack.h2, story.ch2.snack.h3, story.ch2.snack.h4, story.ch2.snack.h5]}
          - {text_key: story.ch2.snack.p5}
          - {widget: {id: cta, route: /diary, label: story.ch2.mistake.open_diary}}
      - id: ch2-drinks
        icon: "🥤"
        title: {en: "Juices and soda", ru: "Соки и газировка"}
        tasks: [drinks]
        complete: always   # task is shown but does NOT gate — next section opens on open
        blocks:
          - {text_key: story.ch2.drinks.p1}
          - {text_key: story.ch2.drinks.p2}
          - {text_key: story.ch2.drinks.p3}
          - {text_key: story.ch2.drinks.swap}
          - {list: [story.ch2.drinks.h1, story.ch2.drinks.h2, story.ch2.drinks.h3]}
          - {tasks: true}
          - {widget: {id: cta, route: /diary, label: story.ch2.mistake.open_diary}}
      - id: ch2-meals
        icon: "🍽️"
        title: {en: "How many meals a day", ru: "Сколько раз в день надо есть"}
        complete: {section_opened: ch2-meals}
        on_open: [unlock_meal_split]
        blocks:
          - {text_key: story.ch2.meals.p1}
          - {text_key: story.ch2.meals.p2}
          - {text_key: story.ch2.meals.p3}
          - {text_key: story.ch2.meals.advice}
          - {text_key: story.ch2.meals.unlocked}
          - {widget: {id: cta, route: /diary, label: story.ch2.mistake.open_diary}}
      - id: ch2-night
        icon: "🌙"
        title: {en: "Eating at night", ru: "Еда на ночь"}
        tasks: [night]
        complete: always   # task is shown but does NOT gate — chapter advances on open
        blocks:
          - {text_key: story.ch2.night.p1}
          - {text_key: story.ch2.night.p2}
          - {text_key: story.ch2.night.p3}
          - {text_key: story.ch2.night.p4}
          - {text_key: story.ch2.night.p5}
          - {text_key: story.ch2.night.p6}
          - {text_key: story.ch2.night.p7}
          - {list: [story.ch2.night.h1, story.ch2.night.h2, story.ch2.night.h3]}
          - {tasks: true}

  - id: ch3
    title: {en: "We start losing weight", ru: "Начинаем худеть"}
    # Opens once the food diary has 7 days of entries IN A ROW (read from the diary).
    open: {streak: diary, gte: 7}
    sections:
      # Section 1 — carries the calorie-planka task (kept exactly as before).
      # Lesson prose for "Ищем дефицит" is added later.
      - id: ch3-deficit
        icon: "🔍"
        title: {en: "Finding the deficit", ru: "Ищем дефицит"}
        complete: {sensor: calorie_planka_set}
        blocks:
          - {text_key: story.ch3.deficit.p1}
          - {text_key: story.ch3.deficit.p2}
          - {text_key: story.ch3.deficit.p3}
          - {text_key: story.ch3.deficit.p4}
          - {text_key: story.ch3.deficit.p5}
          - {text_key: story.ch3.deficit.p6}
          - {text_key: story.ch3.deficit.p7}
          - {text_key: story.ch3.deficit.ex1}
          - {text_key: story.ch3.deficit.ex2}
          - {text_key: story.ch3.deficit.ex3}
          - {text_key: story.ch3.deficit.ex4}
          - {text_key: story.ch3.deficit.p8}
          - {text_key: story.ch3.deficit.p9}
          - {text_key: story.ch3.deficit.p10}
          - {text_key: story.ch3.deficit.p11}
          - {text_key: story.ch3.deficit.p12}
          - {text_key: story.ch3.deficit.p13}
          - {text_key: story.ch3.deficit.p14}
          - {widget: {id: calorie_planka}}
      # Sections 2–9 — structure only; prose blocks are filled in once written.
      - id: ch3-no-loss
        icon: "🤔"
        title: {en: "Why the weight isn't coming off", ru: "Почему не уходит вес"}
        tasks: [steps_planka]
        complete: always   # task shown but does NOT gate — next section opens on open
        blocks:
          - {text_key: story.ch3.noloss.p1}
          - {text_key: story.ch3.noloss.p2}
          - {text_key: story.ch3.noloss.p3}
          - {text_key: story.ch3.noloss.p4}
          - {text_key: story.ch3.noloss.p5}
          - {text_key: story.ch3.noloss.p6}
          - {text_key: story.ch3.noloss.p7}
          - {text_key: story.ch3.noloss.p8}
          - {text_key: story.ch3.noloss.p9}
          - {text_key: story.ch3.noloss.p10}
          - {text_key: story.ch3.noloss.p11}
          - {tasks: true}
          - {widget: {id: weekly_card}}
      - id: ch3-calorie
        icon: "⚡"
        title: {en: "The calorie", ru: "Калория"}
        tasks: [weighin_q5]
        complete: always   # task shown but does NOT gate — next section opens on open
        blocks:
